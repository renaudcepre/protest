[project]
name = "protest"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "colorlog>=6.9.0",
    "pytest>=8.3.5",
    "pytest-asyncio>=0.26.0",
    "pyyaml>=6.0.2",
]


[tool.ruff]
output-format = "concise"
line-length = 120

[tool.ruff.lint]
select = [
    "F", # Pyflakes
    "E", "W", # pycodestyle
    "UP", # pyupgrade
    "B", # flake8-bugbear
    "I", # isort
    "SIM", # flake8-simplify
    "PL", # Pylint

    # pydocstyle
    "D212", # Multi-line docstring summary should start at the first line

    "N", # pep8-naming
    "C4", # flake8-comprehensions
    "PIE", # flake8-pie
    "T20", # flake8-print
    "PYI", # flake8-pyi
    "RET", # flake8-return
    "RUF", # Ruff-specific rules
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
    "PLR2004", # Magic value used in comparison
]


[tool.mypy]
strict = true
exclude = [
    "usage_examples",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"
log_cli = true
log_cli_level = "INFO"
log_cli_format = "[%(levelname)7s] %(name)20s - %(message)s"

[dependency-groups]
dev = [
    "mypy>=1.17.1",
    "pytest-cov>=6.0.0",
]
