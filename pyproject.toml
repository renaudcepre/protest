[project]
name = "protest"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []


[tool.ruff]
output-format = "concise"
line-length = 120

[tool.ruff.lint]
select = [
    "F", # Pyflakes
    "E", "W", # pycodestyle
    "UP", # pyupgrade
    "B", # flake8-bugbear
    "I", # isort
    "SIM", # flake8-simplify
    "PL", # Pylint

    # pydocstyle
    "D212", # Multi-line docstring summary should start at the first line

    "N", # pep8-naming
    "S", # flake8-bandit
    "C4", # flake8-comprehensions
    "PIE", # flake8-pie
    "T20", # flake8-print
    "PYI", # flake8-pyi
    "RET", # flake8-return
    "RUF", # Ruff-specific rules
]


[tool.ruff.lint.per-file-ignores]
"tests/**" = [
    "S101", #  Use of `assert` detected
    "PLR2004", # Magic value used in comparison
]

[tool.mypy]
strict = true
