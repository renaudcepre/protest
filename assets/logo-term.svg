<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="400" height="120">
  <!-- Bulles cluster avec léger pulse -->
  <circle cx="12" cy="34" r="4" fill="#A855F7" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.6;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="28" r="5" fill="#A855F7" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="16" cy="40" r="3" fill="#A855F7" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.5;0.7" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="38" r="2.5" fill="#A855F7" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.7;0.5" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="10" cy="24" r="2" fill="#A855F7" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <text x="32" y="38" font-family="monospace" font-size="16" font-weight="600" fill="#F8FAFC">protest</text>
</svg>
