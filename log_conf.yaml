version: 1

disable_existing_loggers: False

formatters:
  colored:
    '()': 'colorlog.ColoredFormatter'
    format: '%(log_color)s[%(levelname)-8s] %(name)-28s%(reset)s %(message)s'
    log_colors:
      DEBUG: 'cyan'
      INFO: 'green'
      WARNING: 'purple'
      ERROR: 'red'
      CRITICAL: 'light_red'

handlers:
  console:
    class: 'logging.StreamHandler'
    formatter: 'colored'
    stream: ext://sys.stdout

root:
  level: DEBUG
  handlers:
    - console
  propagate: no
