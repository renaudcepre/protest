k-content{margin-top:var(--space-sm);padding:var(--space-md);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);overflow-x:auto}.traceback-content pre{font-family:var(--font-mono);font-size:var(--text-xs);line-height:1.6;white-space:pre-wrap;word-break:break-word}.failures{grid-area:failures;background:var(--bg-surface);border-top:1px solid var(--border-subtle);max-height:40vh;display:flex;flex-direction:column}.failures[data-state=empty]{display:none}.failures-header{display:flex;align-items:center;gap:var(--space-sm);padding:var(--space-sm) var(--space-xl);cursor:pointer;-webkit-user-select:none;user-select:none;flex-shrink:0}.failures-header:hover{background:var(--bg-hover)}.failures-chevron{width:14px;height:14px;color:var(--text-muted);transition:transform .15s ease}.failures[data-state=expanded] .failures-chevron{transform:rotate(180deg)}.failures-title{font-family:var(--font-sans);font-size:var(--text-sm);font-weight:500;color:var(--color-fail)}.failures-count{font-size:var(--text-xs);color:var(--text-muted)}.failures-list{flex:1;overflow-y:auto;padding:0 var(--space-xl) var(--space-lg);display:none}.failures[data-state=expanded] .failures-list{display:block}.failure-card{background:var(--bg-base);border:1px solid var(--border-subtle);border-left:3px solid var(--color-fail);border-radius:var(--radius-md);padding:var(--space-md);margin-bottom:var(--space-sm)}.failure-name{font-weight:500;font-size:var(--text-sm)}.failure-location{font-size:var(--text-xs);color:var(--text-muted);margin-top:var(--space-xs)}.failure-traceback{margin-top:var(--space-sm);padding:var(--space-sm);background:var(--bg-elevated);border-radius:var(--radius-sm);overflow-x:auto}.failure-traceback pre{font-size:var(--text-xs);line-height:1.5}.syn-keyword{color:var(--syn-keyword)}.syn-string{color:var(--syn-string)}.syn-number{color:var(--syn-number)}.syn-comment{color:var(--syn-comment);font-style:italic}.syn-function{color:var(--syn-function)}.syn-path{color:var(--syn-path)}.syn-error{color:var(--syn-error);font-weight:500}.syn-lineno{color:var(--syn-lineno);-webkit-user-select:none;user-select:none}.syn-caret{color:var(--color-fail)}.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);text-align:center}.empty-state-icon{font-size:32px;margin-bottom:var(--space-md);opacity:.5}.empty-state-text{font-size:var(--text-sm)}@keyframes slideIn{0%{opacity:0;transform:translate(-4px)}to{opacity:1;transform:translate(0)}}</style>
</head>
<body>
  <div id="tooltip"></div>
  <div class="app">
    <header class="header">
      <div class="logo">
        <span class="logo-text">ProTest</span>
        <span class="logo-version">v0.1.0</span>
      </div>
      <div class="session-info">
        <span class="session-target" id="session-target">Waiting for session...</span>
        <div class="connection-status">
          <span class="connection-dot" id="connection-dot" data-state="connecting"></span>
          <span id="connection-text">Connecting</span>
        </div>
      </div>
    </header>

    <div class="stats">
      <div class="stat" data-type="pass">
        <span class="stat-value" id="stat-pass">0</span>
        <span class="stat-label">Pass</span>
      </div>
      <div class="stat" data-type="fail">
        <span class="stat-value" id="stat-fail">0</span>
        <span class="stat-label">Fail</span>
      </div>
      <div class="stat" data-type="skip">
        <span class="stat-value" id="stat-skip">0</span>
        <span class="stat-label">Skip</span>
      </div>
      <div class="stat" data-type="xfail">
        <span class="stat-value" id="stat-xfail">0</span>
        <span class="stat-label">XFail</span>
      </div>
      <div class="stat" data-type="error">
        <span class="stat-value" id="stat-error">0</span>
        <span class="stat-label">Error</span>
      </div>
      <div class="stat stat--timer">
        <span class="stat-value" id="timer">0.00s</span>
        <span class="stat-label">Time</span>
      </div>
    </div>

    <div class="progress">
      <div class="progress-bar">
        <div class="progress-segment" data-type="pass" id="progress-pass" style="width: 0%"></div>
        <div class="progress-segment" data-type="fail" id="progress-fail" style="width: 0%"></div>
        <div class="progress-segment" data-type="skip" id="progress-skip" style="width: 0%"></div>
        <div class="progress-segment" data-type="xfail" id="progress-xfail" style="width: 0%"></div>
        <div class="progress-segment" data-type="error" id="progress-error" style="width: 0%"></div>
      </div>
      <span class="progress-text" id="progress-text">0 / 0</span>
      <label class="filter-toggle">
        <input type="checkbox" id="hide-passed">
        <span>Hide passed</span>
      </label>
    </div>

    <main class="main" id="main">
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">&#9671;</div>
        <div class="empty-state-text">Waiting for tests...</div>
      </div>
      <div id="suites-container"></div>
    </main>

    <div class="failures" id="failures-panel" data-state="empty">
      <div class="failures-header" id="failures-header">
        <svg class="failures-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 6l4 4 4-4"/>
        </svg>
        <span class="failures-title">Failures</span>
        <span class="failures-count" id="failures-count">(0)</span>
      </div>
      <div class="failures-list" id="failures-list"></div>
    </div>
  </div>

</body>
</html>
